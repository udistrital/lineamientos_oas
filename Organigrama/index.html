<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organigrama OATI - Editor Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-group">
      <button id="btnAddTeam" type="button">+ Equipo</button>
      <button id="btnAddPerson" type="button">+ Persona</button>
      <button id="btnAddFunction" type="button">+ Funcion</button>
      <button id="btnAddComment" type="button">+ Comentario</button>
      <button id="btnAddLink" type="button">+ Conexion</button>
    </div>

    <div class="toolbar-group">
      <button id="btnAutoLinks" type="button">Conexiones automaticas</button>
      <button id="btnManualConnect" type="button">Modo conectar: OFF</button>
      <button id="btnClearLinks" type="button">Borrar conexiones</button>
    </div>

    <div class="toolbar-group">
      <button id="btnZoomOut" type="button">-</button>
      <span id="zoomLabel">100%</span>
      <button id="btnZoomIn" type="button">+</button>
      <button id="btnResetView" type="button">Reset vista</button>
      <button id="btnSaveProject" type="button">Guardar .json</button>
      <button id="btnLoadProject" type="button">Cargar .json</button>
      <button id="btnExportPdf" type="button">Exportar PDF</button>
      <label class="logo-upload">
        Logo OATI
        <input id="logoInput" type="file" accept="image/*">
      </label>
    </div>
  </header>

  <main class="canvas-wrapper" id="canvasWrapper">
    <svg id="diagramSvg" viewBox="0 0 3600 2600" aria-label="Editor de organigrama OATI">
      <defs>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000033"/>
        </filter>
        <filter id="cableBlur" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.3"/>
        </filter>
      </defs>
      <g id="viewport">
        <rect id="bgGrid" x="-500000" y="-500000" width="1000000" height="1000000"></rect>
        <g id="bgFxLayer"></g>
        <g id="teamsLayer"></g>
        <g id="linksLayer"></g>
        <g id="frontNodesLayer"></g>
      </g>
    </svg>
    <input id="stateFileInput" class="hidden" type="file" accept=".json,application/json" aria-label="Cargar proyecto">
    <input id="inlineEditor" class="inline-editor hidden" type="text" aria-label="Editar texto del recuadro">
    <div id="nodeContextMenu" class="context-menu hidden" role="menu" aria-label="Acciones de elemento">
      <button id="menuEditNode" type="button">Editar texto</button>
      <button id="menuIncreaseFont" type="button">Agrandar fuente</button>
      <button id="menuReduceFont" type="button">Reducir fuente</button>
      <button id="menuColorNode" type="button">Cambiar color</button>
      <div id="menuColorPalette" class="menu-color-palette">
        <button type="button" class="menu-color-swatch" data-color="#ffffff" style="background:#ffffff" aria-label="Blanco"></button>
        <button type="button" class="menu-color-swatch" data-color="#f8fafc" style="background:#f8fafc" aria-label="Gris claro"></button>
        <button type="button" class="menu-color-swatch" data-color="#39b9ff" style="background:#39b9ff" aria-label="Azul"></button>
        <button type="button" class="menu-color-swatch" data-color="#34d399" style="background:#34d399" aria-label="Verde"></button>
        <button type="button" class="menu-color-swatch" data-color="#f59e0b" style="background:#f59e0b" aria-label="Naranja"></button>
        <button type="button" class="menu-color-swatch" data-color="#a78bfa" style="background:#a78bfa" aria-label="Morado"></button>
        <button type="button" class="menu-color-swatch" data-color="#f472b6" style="background:#f472b6" aria-label="Rosa"></button>
        <button type="button" class="menu-color-swatch" data-color="#ef4444" style="background:#ef4444" aria-label="Rojo"></button>
        <button type="button" class="menu-color-swatch" data-color="#0b0b0d" style="background:#0b0b0d" aria-label="Negro"></button>
      </div>
    </div>
    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
